<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>115 帝國</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#c0565a;--rose-d:#9e3d41;--rose-l:#fdeef0;--rose-m:#f0b8bb;
  --gold:#b8892a;--gold-l:#fdf5e0;
  --teal:#2e8272;--teal-l:#e2f4f0;
  --bg:#fdf7f5;--surf:#fff;
  --txt:#382020;--muted:#9a7878;--faint:#f5efee;
  --bdr:rgba(192,86,90,0.12);
  --shd:0 2px 24px rgba(192,86,90,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--txt);min-height:100%;display:flex;justify-content:center;}
.shell{width:100%;max-width:480px;min-height:100vh;background:var(--surf);box-shadow:0 0 60px rgba(192,86,90,0.07);}

/* LOGIN */
#lv{display:flex;flex-direction:column;align-items:center;padding:56px 28px 48px;}
.logo-wrap{position:relative;margin-bottom:18px;}
.logo-img{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--rose-m);box-shadow:0 6px 28px rgba(192,86,90,0.22);display:block;animation:bobble 3.5s ease-in-out infinite;}
.logo-crown{position:absolute;bottom:-4px;right:-4px;font-size:22px;}
@keyframes bobble{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.login-title{font-family:"Noto Serif TC",serif;font-size:28px;color:var(--rose);letter-spacing:4px;margin-bottom:3px;}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:4px;margin-bottom:28px;}
.fwrap{width:100%;margin-bottom:10px;}
.flabel{font-size:11px;color:var(--muted);letter-spacing:1px;font-weight:500;margin-bottom:5px;display:block;}
.fwrap select,.fwrap input{width:100%;padding:13px 16px;border-radius:16px;border:1.5px solid var(--bdr);font-size:14px;font-family:inherit;background:var(--faint);color:var(--txt);outline:none;transition:border-color .2s;}
.fwrap select:focus,.fwrap input:focus{border-color:var(--rose-m);background:#fff;}
.login-btn{width:100%;margin-top:8px;padding:15px;border-radius:50px;border:none;background:var(--rose);color:white;font-size:15px;font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:1.5px;box-shadow:0 6px 20px rgba(192,86,90,0.3);transition:all .2s;}
.login-btn:hover{background:var(--rose-d);}
.login-btn:active{transform:scale(.97);}
.disclaimer{background:var(--faint);border-radius:16px;padding:14px 16px;margin-top:24px;font-size:11px;color:#bbb;border:1px dashed rgba(192,86,90,0.18);line-height:2;width:100%;}
.ftxt{font-size:10px;color:#ddd;margin-top:14px;}

/* HEADER */
.top-hd{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--surf);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:30;}
.hd-l{display:flex;align-items:center;gap:10px;}
.hd-av{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--rose-m);}
.hd-nick{font-size:13px;font-weight:500;}
.hd-sub{font-size:10px;color:var(--muted);}
.hd-hearts{font-family:"Noto Serif TC",serif;font-size:17px;font-weight:700;color:var(--rose);}
.hd-hearts small{font-size:11px;font-weight:400;color:var(--muted);font-family:"Noto Sans TC",sans-serif;}
.hd-sync{font-size:10px;color:var(--muted);margin-top:1px;}
.out-btn{background:none;border:none;color:#ccc;font-size:11px;cursor:pointer;font-family:inherit;padding:5px 9px;border-radius:8px;}
.out-btn:hover{background:var(--rose-l);color:var(--rose);}

/* SYNC indicator */
.sync-bar{background:var(--teal-l);border-bottom:1px solid rgba(46,130,114,0.2);padding:6px 18px;font-size:11px;color:var(--teal);display:none;align-items:center;gap:6px;}
.sync-bar.show{display:flex;}
.spin{display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV */
.tab-nav{display:flex;border-bottom:1px solid var(--bdr);background:var(--surf);overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-nav span{flex-shrink:0;padding:13px 14px 11px;cursor:pointer;font-size:13px;font-weight:500;color:#bbb;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;}
.tab-nav span.active{color:var(--rose);border-bottom-color:var(--rose);}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:20px;margin:14px 16px;box-shadow:var(--shd);}
.card-t{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:14px;}
.sec-lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1.5px;margin:16px 16px 8px;display:flex;align-items:center;gap:6px;}

/* INPUTS */
.inp{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--bdr);font-size:13px;font-family:inherit;background:var(--faint);color:var(--txt);outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--rose-m);background:#fff;}
.irow{display:flex;gap:8px;margin-top:8px;}
.irow .inp{margin:0;}

/* BUTTONS */
.btn{border:none;padding:10px 18px;border-radius:50px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:700;transition:all .18s;}
.btn:active{transform:scale(.95);}
.b-rose{background:var(--rose);color:#fff;}
.b-rose:hover{background:var(--rose-d);}
.b-gold{background:var(--gold);color:#fff;}
.b-teal{background:var(--teal);color:#fff;}
.b-ghost{background:var(--faint);color:var(--muted);border:1.5px solid var(--bdr);}
.b-ghost:hover{background:var(--rose-l);color:var(--rose);}
.b-danger{background:#ffecec;color:var(--rose);border:1.5px solid var(--rose-m);}
.b-full{display:block;width:100%;margin-top:10px;padding:13px;border-radius:14px;text-align:center;}
.b-sm{padding:7px 14px;font-size:12px;}
.b-xs{padding:4px 10px;font-size:11px;border-radius:20px;}
.icn-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:3px 6px;border-radius:6px;}
.icn-btn:hover{background:var(--rose-l);color:var(--rose);}

/* LIST */
.li{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:1px solid var(--faint);}
.li:last-child{border-bottom:none;}
.li-m{flex:1;}
.li-name{font-size:14px;font-weight:500;}
.li-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.li-r{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.t-pending{background:#fff4e0;color:#c07800;}
.t-approved{background:var(--teal-l);color:var(--teal);}
.t-rejected{background:var(--rose-l);color:var(--rose);}

/* EDICT */
.edict{background:var(--gold-l);border:1px solid rgba(184,137,42,0.2);border-radius:16px;padding:14px 16px;margin-bottom:10px;}
.edict-name{font-size:14px;font-weight:600;}
.edict-pts{font-size:12px;color:var(--gold);font-weight:700;margin-top:2px;}
.edict-foot{display:flex;gap:8px;margin-top:10px;align-items:center;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--faint);border:1.5px solid var(--bdr);border-radius:50px;padding:8px 14px;cursor:pointer;transition:all .18s;font-size:13px;}
.chip:hover{background:var(--rose-l);border-color:var(--rose-m);}
.chip-pts{font-size:11px;color:var(--rose);font-weight:700;}
.chip-x{background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:0 0 0 2px;line-height:1;}
.chip-x:hover{color:var(--rose);}

/* MOOD */
.mood-row{display:flex;justify-content:center;gap:8px;margin:10px 0 4px;}
.mood-o{font-size:28px;cursor:pointer;padding:6px 10px;border-radius:12px;transition:all .15s;border:2px solid transparent;}
.mood-o:hover{background:var(--rose-l);}
.mood-o.sel{background:var(--rose-l);border-color:var(--rose-m);}
.mood-dp{display:flex;justify-content:center;gap:20px;margin:10px 0;font-size:13px;color:var(--muted);}

/* STATS */
.stat-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-b{border-radius:16px;padding:14px;text-align:center;}
.sv{font-family:"Noto Serif TC",serif;font-size:26px;font-weight:700;display:block;}

/* LOG */
.log-li{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--faint);}
.log-li:last-child{border-bottom:none;}
.log-reason{font-size:13px;}
.log-note{font-size:11px;color:var(--muted);margin-top:2px;}
.lv-pos{color:var(--teal);font-weight:700;font-size:14px;white-space:nowrap;}
.lv-neg{color:var(--rose);font-weight:700;font-size:14px;white-space:nowrap;}

/* ADJ */
.adj-row{display:flex;gap:6px;margin-top:5px;align-items:center;}
.adj-inp{width:80px;padding:7px 10px;border-radius:10px;border:1.5px solid var(--bdr);font-size:13px;font-family:inherit;background:var(--faint);color:var(--txt);outline:none;text-align:center;}
.adj-inp:focus{border-color:var(--rose-m);}

.add-form{background:var(--faint);border-radius:14px;padding:14px;margin-top:12px;}
.af-t{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px;}

/* TOAST */
#toast{position:fixed;top:-70px;left:50%;transform:translateX(-50%);background:rgba(40,18,18,.88);color:#fff;padding:11px 26px;border-radius:30px;font-size:13px;z-index:9999;transition:top .4s cubic-bezier(.18,.89,.32,1.28);white-space:nowrap;max-width:90%;}
#toast.show{top:20px;}

.empty{text-align:center;color:var(--muted);font-size:13px;padding:28px 0;}
.empty-i{font-size:32px;opacity:.4;display:block;margin-bottom:8px;}
.tab-c{display:none;}
.tab-c.active{display:block;}
.hidden{display:none!important;}
hr{border:none;border-top:1px solid var(--faint);margin:14px 0;}
</style>
</head>

<div class="shell">
<div id="toast"></div>

<!-- LOGIN -->
<div id="lv">
  <div class="logo-wrap">
    <img class="logo-img" id="lg-img" src="">
    <span class="logo-crown">👑</span>
  </div>
  <div class="login-title">115 帝國</div>
  <div class="login-sub">ROYAL CLOUD SYSTEM</div>
  <div class="fwrap">
    <label class="flabel">選擇身份</label>
    <select id="rs">
      <option value="king">115大王 👑</option>
      <option value="dog">林承承小狗 🐶</option>
    </select>
  </div>
  <div class="fwrap">
    <label class="flabel">密碼</label>
    <input type="password" id="pw" placeholder="輸入密碼">
  </div>
  <button class="login-btn" id="login-btn">認證並進入帝國</button>
  <div class="disclaimer">
    <b>👑 帝國使用聲明</b><br>
    1. 本系統為私人情侶互動系統，僅供兩人使用。<br>
    2. 愛心資料與紀錄同步至 Google 試算表。<br>
    3. 製作者：林承承 ♡ 115大王
  </div>
  <div class="ftxt">&copy; 2026 115 帝國. All Rights Reserved.</div>
</div>

<!-- MAIN -->
<div id="mv" class="hidden">
  <div class="top-hd">
    <div class="hd-l">
      <img class="hd-av" id="hd-av" src="">
      <div>
        <div class="hd-nick" id="hd-nick"></div>
        <div class="hd-sub" id="hd-sub"></div>
      </div>
    </div>
    <div style="text-align:right;">
      <div class="hd-hearts">❤️ <span id="hd-h">—</span><small> 愛心</small></div>
      <div class="hd-sync" id="hd-sync">同步中...</div>
    </div>
    <button class="out-btn" id="out-btn">登出</button>
  </div>
  <div class="sync-bar" id="sync-bar"><span class="spin">↻</span> 與雲端同步中...</div>
  <div class="tab-nav" id="tnav"></div>
  <div id="tbody" style="padding-bottom:40px;"></div>
</div>
</div>

══════════════════════════════════════ */
function sg(k){ try{ return JSON.parse(localStorage.getItem("e115_"+k)); }catch(e){ return null; } }
function ss(k,v){ localStorage.setItem("e115_"+k, JSON.stringify(v)); }
function loadLocal(){
  STATE.hearts = sg("hearts") !== null ? sg("hearts") : 100;
  STATE.logs   = sg("logs")   || [];
  STATE.tasks  = sg("tasks")  || [];
  STATE.tpls   = sg("tpls")   || [];
  STATE.edicts = sg("edicts") || [];
  STATE.gifts  = sg("gifts")  || [];
  STATE.mk     = sg("mk")     || "👑";
  STATE.md     = sg("md")     || "🐶";
  STATE.apc    = sg("apc")    || 0;
}
function saveLocal(){
  ss("hearts", STATE.hearts);
  ss("logs",   STATE.logs);
  ss("tasks",  STATE.tasks);
  ss("tpls",   STATE.tpls);
  ss("edicts", STATE.edicts);
  ss("gifts",  STATE.gifts);
  ss("mk",     STATE.mk);

  ss("apc",    STATE.apc);
}

══════════════════════════════════════ */
var _tt;
function toast(m){
  var el = document.getElementById("toast");
  el.textContent = m;
  el.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove("show"); }, 2800);
}

/* ══════════════════════════════════════
   GAS 雲端同步
══════════════════════════════════════ */
function showSyncing(on){
  var bar = document.getElementById("sync-bar");
  if(bar) on ? bar.classList.add("show") : bar.classList.remove("show");
}

// 從 GAS 讀取 hearts & logs（GET）
function syncFromServer(){
  if(!CU){ return; }
  showSyncing(true);
  // GAS GET 需要用 no-cors 的 script tag 方式，或直接用 fetch + text 解析
  // 愛心永遠屬於小狗，無論誰登入都讀 dog 的資料
  var url = GAS + "?role=dog&t=" + Date.now();
  fetch(url, { method:"GET", redirect:"follow" })
    .then(function(r){ return r.text(); })
    .then(function(txt){
      try {
        // 去掉可能的 BOM 或多餘字元
        var clean = txt.trim();
        // GAS 有時會回傳 JSONP 包裝，嘗試直接 parse
        var data = JSON.parse(clean);
        if(data && data.hearts !== undefined){
          STATE.hearts = Number(data.hearts);
          if(data.logs && data.logs.length){ STATE.logs = data.logs; }
          saveLocal(); updHd();
          var activeNav = document.querySelector(".tab-nav span.active");
          if(activeNav && activeNav.dataset.id === "log") goTab("log");
          document.getElementById("hd-sync").textContent = "已同步 " + ft(Date.now());
        }
      } catch(pe){
        console.warn("同步 parse 失敗:", pe, "原始回應:", txt.slice(0,100));
        document.getElementById("hd-sync").textContent = "同步異常";
      }
      showSyncing(false);
    })
    .catch(function(err){
      console.warn("同步連線失敗:", err);
      showSyncing(false);
      document.getElementById("hd-sync").textContent = "離線模式";
    });
}

// 送出動作到 GAS（POST）：愛心變動
function cloudAction(change, reason, note){
  if(!CU){ return Promise.resolve({success:false}); }
  note = note || "";
  // 先本地更新，保證 UI 即時響應
  STATE.hearts += Number(change);
  STATE.logs.unshift({id:Date.now(), r:reason, note:note, v:Number(change), t:Date.now()});
  saveLocal(); updHd();
  // GAS POST：用 text/plain 避免 preflight CORS 問題
  return fetch(GAS, {
    method: "POST",
    headers: {"Content-Type":"text/plain"},
    // 愛心永遠屬於小狗，所有增減都寫入 dog
    body: JSON.stringify({ role: "dog", change: Number(change), reason: reason, note: note })
  })
  .then(function(r){ return r.text(); })
  .then(function(txt){
    try {
      var data = JSON.parse(txt.trim());
      if(data && data.hearts !== undefined){
        STATE.hearts = Number(data.hearts);
        saveLocal(); updHd();
      }
      return {success:true};
    } catch(e){
      // GAS 有時回傳非 JSON 文字（如 "成功"），視為成功
      console.log("GAS 回應:", txt.slice(0,80));
      return {success:true, raw:txt};
    }
  })
  .catch(function(err){
    console.warn("cloudAction 連線失敗（已離線儲存）:", err);
    return {success:false, offline:true};
  });
}

window.auditT = function(id, pass){
  var idx = STATE.tasks.findIndex(function(t){ return t.id===id; });
  if(idx < 0) return;
  var t = STATE.tasks[idx];
  var actual = t.p;
  if(pass){
    var inp = document.getElementById("adj-"+id);
    if(inp){ actual = parseInt(inp.value); if(isNaN(actual)){ toast("請輸入有效點數"); return; } }
  }
  STATE.tasks[idx].st = pass ? "approved" : "rejected";
  STATE.tasks[idx].actual = actual;
  if(pass){
    STATE.apc++;
    ss("apc", STATE.apc);
    var reason = "准奏：" + t.n + (actual !== t.p ? "（調整為"+actual+"）" : "");
    // cloudAction 內部已處理本地更新 + 雲端同步
    cloudAction(actual, reason, "").then(function(){
      toast("🎉 准奏！「"+t.n+"」+"+actual+" 愛心");
    });
  } else {
    saveLocal();
    toast("已駁回「"+t.n+"」");
  }
  goTab("audit");
};

function rVault(){
  var gifts = STATE.gifts;
  var list = gifts.length ? gifts.map(function(g){
    return '<div class="li"><div class="li-m"><div class="li-name">'+g.ti+'</div>'
      +'<div class="li-sub">需要 '+g.p+' 愛心</div></div>'
      +'<button class="icn-btn" onclick="delGift('+g.id+')">✕</button></div>';
  }).join("") : '<div class="empty"><span class="empty-i">📦</span>尚未新增</div>';
  return '<div class="card"><div class="card-t">🎁 新增禮物</div>'
    +'<input class="inp" id="gti" placeholder="禮物名稱">'
    +'<div class="irow" style="margin-top:8px"><input class="inp" id="gp" type="number" placeholder="所需愛心">'
    +'<button class="btn b-gold b-sm" onclick="saveGift()">存入</button></div></div>'
    +'<div class="sec-lbl">目前寶庫</div><div style="padding:0 16px">'+list+'</div>';
}
window.saveGift = function(){
  var ti = document.getElementById("gti").value.trim();
  var p = parseInt(document.getElementById("gp").value);
  if(!ti || isNaN(p)){ toast("請填寫完整"); return; }
  STATE.gifts.push({id:Date.now(), ti:ti, p:p});
  saveLocal(); toast("已存入寶庫！"); goTab("vault");
};
window.delGift = function(id){
  if(!confirm("確定刪除？")) return;
  STATE.gifts = STATE.gifts.filter(function(g){ return g.id !== id; });
  saveLocal(); toast("已刪除"); goTab("vault");
};

window.doDeduct = function(){

  var p = parseInt(document.getElementById("dp").value);
  if(!reason || isNaN(p) || p<=0){ toast("請填寫原因和點數"); return; }
  if(!confirm("確定扣除 "+p+" 愛心？原因："+reason)) return;
  var fullReason = "💔 大王裁決：" + reason;
  cloudAction(-p, fullReason, "").then(function(){
    toast("已扣除 "+p+" 愛心，小狗將看到原因");
    goTab("deduct");
  });
};

/* ══════════════════════════════════════
   📊 紀錄 (共用) — 顯示雲端 logs
══════════════════════════════════════ */
function rLog(){
  var logs = STATE.logs.slice(0, 30);
  var mk = STATE.mk; var md = STATE.md;
  var mkey = CU.role==="king" ? "mk" : "md";
  var myM = STATE[mkey] || "😊";
  var lhtml = logs.length ? logs.map(function(l){
    var t_str = typeof l.t === "number" ? ft(l.t) : (l.t || "");
    return '<div class="log-li"><div style="flex:1"><div class="log-reason">'+l.r+'</div>'
      +(l.note?'<div class="log-note">'+l.note+'</div>':'')
      +'<div class="log-note">'+t_str+'</div></div>'
      +'<b class="'+(Number(l.v)>=0?"lv-pos":"lv-neg")+'">'+(Number(l.v)>=0?"+":"")+l.v+'</b></div>';
  }).join("") : '<div class="empty"><span class="empty-i">💰</span>尚無紀錄</div>';
  var moods = ["😊","🥰","😴","😡","😭"].map(function(e){
    return '<span class="mood-o'+(myM===e?" sel":"")+'" onclick="setMood(\''+e+'\',this)">'+e+'</span>';
  }).join("");
  return '<div class="card">'
    +'<div class="stat-g">'
    +'<div class="stat-b" style="background:var(--rose-l)"><span class="sv" style="color:var(--rose)">'+STATE.hearts+'</span><div style="font-size:11px;color:var(--muted)">目前愛心</div></div>'
    +'<div class="stat-b" style="background:var(--teal-l)"><span class="sv" style="color:var(--teal)">'+STATE.apc+'</span><div style="font-size:11px;color:var(--muted)">已准奏次數</div></div>'
    +'</div>'
    +'<div class="card-t">今日心情</div>'
    +'<div class="mood-row">'+moods+'</div>'
    +'<div class="mood-dp"><span>大王：<b id="mk-d">'+mk+'</b></span><span>小狗：<b id="md-d">'+md+'</b></span></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px">'
    +'<div class="sec-lbl" style="margin:16px 0 8px">💰 愛心流水帳</div>'
    +'<button class="btn b-ghost b-xs" onclick="syncFromServer();toast(\'同步中...\')">↻ 同步</button>'
    +'</div>'
    +'<div style="padding:0 16px">'+lhtml+'</div>';
}
window.setMood = function(e, el){
  var k = CU.role==="king" ? "mk" : "md";
  STATE[k] = e;
  document.querySelectorAll(".mood-o").forEach(function(x){ x.classList.remove("sel"); });
  el.classList.add("sel");
  var did = CU.role==="king" ? "mk-d" : "md-d";
  var d = document.getElementById(did); if(d) d.textContent = e;
  saveLocal(); toast("心情已更新");
};

/* ══════════════════════════════════════
   ✉ 任務申報 (Dog)
══════════════════════════════════════ */
function rReport(){
  var tpls = STATE.tpls;
  var tasks = STATE.tasks.slice().reverse().slice(0, 20);
  var labels = {pending:"待批閱", approved:"已准奏", rejected:"已駁回"};
  var chips = tpls.length ? tpls.map(function(t){
    return '<div class="chip" onclick="subTask(\''+esc(t.n)+'\','+t.p+')">'
      +'<span>'+t.n+'</span><span class="chip-pts">+'+t.p+'❤</span>'
      +'<button class="chip-x" onclick="event.stopPropagation();delTpl('+t.id+')">✕</button></div>';
  }).join("") : '<div style="font-size:13px;color:var(--muted)">尚無快捷</div>';
  var hist = tasks.length ? tasks.map(function(t){
    var adj = t.actual !== undefined ? "（實得 "+t.actual+"）" : "";
    return '<div class="li"><div class="li-m"><div class="li-name">'+t.n+'</div>'
      +'<div class="li-sub">申請 '+t.p+' 愛心'+adj+'・'+ft(t.t)+'</div></div>'
      +'<span class="tag t-'+t.st+'">'+labels[t.st]+'</span></div>';
  }).join("") : '<div class="empty"><span class="empty-i">📋</span>尚無紀錄</div>';
  return '<div class="card"><div class="card-t">⚡ 快捷申報</div>'
    +'<div class="chips">'+chips+'</div>'
    +'<div class="add-form"><div class="af-t">＋ 新增快捷</div>'
    +'<div class="irow"><input class="inp" id="tn" placeholder="任務名稱">'
    +'<input class="inp" id="tp" type="number" placeholder="愛心" style="max-width:90px">'
    +'<button class="btn b-teal b-xs" onclick="addTpl()">新增</button></div></div></div>'
    +'<div class="card" style="margin-top:0"><div class="card-t">✉ 自訂申報</div>'
    +'<input class="inp" id="dn" placeholder="任務名稱">'
    +'<div class="irow" style="margin-top:8px"><input class="inp" id="dp2" type="number" placeholder="申請愛心">'
    +'<button class="btn b-rose b-sm" onclick="dirSub()">遞交奏折</button></div></div>'
    +'<div class="sec-lbl">申報歷程</div><div style="padding:0 16px">'+hist+'</div>';
}
window.addTpl = function(){
  var n = document.getElementById("tn").value.trim();
  var p = parseInt(document.getElementById("tp").value);
  if(!n || isNaN(p)){ toast("請填寫完整"); return; }
  STATE.tpls.push({id:Date.now(), n:n, p:p});
  saveLocal(); toast("快捷已新增"); goTab("report");
};
window.delTpl = function(id){
  STATE.tpls = STATE.tpls.filter(function(t){ return t.id !== id; });
  saveLocal(); toast("已刪除"); goTab("report");
};
window.subTask = function(n, p){
  STATE.tasks.push({id:Date.now(), n:n, p:p, st:"pending", t:Date.now()});
  saveLocal(); toast("奏折已呈遞！等候大王裁示 📜"); goTab("report");
};
window.dirSub = function(){
  var n = document.getElementById("dn").value.trim();
  var p = parseInt(document.getElementById("dp2").value);
  if(!n || isNaN(p)){ toast("請填寫完整"); return; }
  window.subTask(n, p);
};

/* ══════════════════════════════════════
   📜 帝國諭旨 (Dog view)
══════════════════════════════════════ */
function rEdview(){
  var edicts = STATE.edicts.slice().reverse();
  var list = edicts.length ? edicts.map(function(e){
    return '<div class="edict"><div class="edict-name">'+e.n+'</div>'
      +'<div class="edict-pts">完成可獲 +'+e.p+' 愛心</div>'
      +'<div class="edict-foot"><button class="btn b-rose b-xs" onclick="subTask(\''+esc(e.n)+'\','+e.p+')">申報完成</button></div></div>';
  }).join("") : '<div class="empty"><span class="empty-i">📜</span>大王尚未頒布諭旨</div>';
  return '<div class="sec-lbl">帝國諭旨</div><div style="padding:0 16px">'+list+'</div>';
}

/* ══════════════════════════════════════
   🎁 寶庫兌換 (Dog) — 同步雲端
══════════════════════════════════════ */
function rShop(){
  var gifts = STATE.gifts;
  var hearts = STATE.hearts;
  var list = gifts.length ? gifts.map(function(g){
    var can = hearts >= g.p;
    return '<div class="li"><div class="li-m"><div class="li-name"><b>'+g.ti+'</b></div>'
      +'<div class="li-sub">💗 '+g.p+' 愛心</div></div>'
      +'<button class="btn '+(can?"b-gold":"b-ghost")+' b-sm" '
      +(can?'onclick="redeem(\''+esc(g.ti)+'\','+g.p+')"':'disabled')+'>'
      +(can?"兌換":"愛心不足")+'</button></div>';
  }).join("") : '<div class="empty"><span class="empty-i">🎁</span>大王尚未設定禮物</div>';
  return '<div class="sec-lbl">寶庫兌換</div><div style="padding:0 16px">'+list+'</div>'
    +'<div class="card" style="background:var(--rose-l);border-color:var(--rose-m);margin-top:8px">'
    +'<div style="font-size:13px;color:var(--rose-d)">目前愛心：'
    +'<b style="font-size:22px;font-family:\'Noto Serif TC\',serif">'+hearts+'</b> ❤️</div></div>';
}
window.redeem = function(ti, p){
  if(STATE.hearts < p){ toast("愛心不足！"); return; }
  if(!confirm("花費 "+p+" 愛心兌換「"+ti+"」？")) return;
  cloudAction(-p, "🎁 兌換："+ti, "").then(function(){
    toast("兌換成功！記得跟大王索取 🎁");
    goTab("shop");
  });
};

/* ══════════════════════════════════════
   Utils
══════════════════════════════════════ */
function ft(ts){
  var d = new Date(ts);
  return (d.getMonth()+1)+"/"+d.getDate()+" "+d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
}
function esc(s){
  return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,'\\"');
}

/* ══════════════════════════════════════
   Boot
══════════════════════════════════════ */
document.getElementById("lg-img").src = "data:image/jpeg;base64," + LOGO;
var ses = localStorage.getItem("e115_ses");
if(ses && ACC[ses]){ CU = ACC[ses]; enterEmpire(); }

})(); // end IIFE
</script>
