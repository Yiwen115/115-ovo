<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>115 帝國</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --rose: #c0565a; --rose-light: #f9eaeb; --rose-mid: #e8b4b6; --gold: #b5882a;
  --gold-light: #fdf5e4; --teal: #2a7a6b; --teal-light: #e3f4f0; --bg: #fdf8f5;
  --surface: #ffffff; --border: rgba(0,0,0,0.08); --text: #2a1f1f;
  --text-muted: #8a7070; --shadow: 0 2px 16px rgba(192,86,90,0.08);
}
html, body { height: 100%; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
#loadScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
.load-crown { font-size: 48px; animation: bobble 1.5s ease-in-out infinite; }
@keyframes bobble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.load-text { font-family: 'Noto Serif TC', serif; font-size: 20px; color: var(--rose); margin-top: 12px; letter-spacing: 3px; }
.load-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; letter-spacing: 2px; }
#app { max-width: 440px; margin: 0 auto; min-height: 100vh; position: relative; }
#loginPage { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding: 32px 24px; }
.login-header { text-align: center; margin-bottom: 36px; }
.login-crown { font-size: 52px; display: block; margin-bottom: 12px; }
.login-title { font-family: 'Noto Serif TC', serif; font-size: 26px; color: var(--rose); letter-spacing: 2px; }
.login-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 3px; margin-top: 4px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 12px; box-shadow: var(--shadow); }
.field-label { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 1px; margin-bottom: 6px; display: block; }
select, input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; background: var(--bg); outline: none; }
.btn { display: block; width: 100%; padding: 13px; border-radius: 14px; border: none; cursor: pointer; font-size: 14px; font-weight: 700; transition: all 0.2s; }
.btn-rose { background: var(--rose); color: white; margin-top: 14px; }
.btn-gold { background: var(--gold); color: white; }
.btn-teal { background: var(--teal); color: white; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.btn-sm { display: inline-block; width: auto; padding: 6px 14px; font-size: 12px; border-radius: 10px; }
#mainPage { display: none; padding: 0 16px 100px; }
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px 4px 12px; }
.top-bar-title { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--rose); }
.days-pill { background: var(--rose-light); color: var(--rose); border: 1px solid var(--rose-mid); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 700; }
.mood-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; box-shadow: var(--shadow); }
.mood-avatar { width: 62px; height: 62px; border-radius: 50%; background: var(--rose-light); border: 2px solid var(--rose-mid); display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 6px; }
.hearts-card { background: linear-gradient(135deg, #fdf0f0 0%, #fff8f0 100%); border: 1px solid var(--rose-mid); border-radius: 24px; padding: 20px 24px; text-align: center; margin-bottom: 12px; }
.hearts-val { font-family: 'Noto Serif TC', serif; font-size: 56px; color: var(--rose); font-weight: 700; display: block; line-height: 1.1; }
.section-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1.5px; margin: 20px 4px 10px; }
.edict-item, .audit-item, .log-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.quick-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 12px; text-align: center; cursor: pointer; position: relative; }
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 440px; background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px 0 16px; z-index: 200; }
.nav-item { cursor: pointer; text-align: center; padding: 6px 14px; color: var(--text-muted); font-size: 10px; }
.nav-item.active { color: var(--rose); }
.page { display: none; }
.page.active { display: block; }
#toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: rgba(42,31,31,0.88); color: white; padding: 10px 24px; border-radius: 30px; font-size: 13px; z-index: 9998; transition: top 0.4s; }
#toast.show { top: 20px; }
.mood-opt { font-size: 28px; cursor: pointer; padding: 6px 8px; }
</style>
</head>
<body>

<div id="loadScreen"><div class="load-crown">👑</div><div class="load-text">115 帝國</div></div>

<div id="app">
  <div id="toast">通知</div>

  <div id="loginPage">
    <div class="login-header"><span class="login-crown">👑</span><div class="login-title">115 帝國</div></div>
    <div class="card">
      <label class="field-label">身份選擇</label>
      <select id="roleSelect"><option value="king">115大王 👑</option><option value="dog">林承承小狗 🐶</option></select>
      <label class="field-label" style="margin-top:12px">通行密碼</label>
      <input type="password" id="pwdInput" placeholder="輸入密碼">
      <button class="btn btn-rose" onclick="doLogin()">進入帝國</button>
    </div>
  </div>

  <div id="mainPage">
    <div class="top-bar"><div class="top-bar-title">115 帝國</div><div class="days-pill" id="daysPill">相愛 ... 天</div></div>

    <div class="mood-card">
      <div style="text-align:center;flex:1"><div class="mood-avatar"><span id="moodKing">👑</span></div><div>大王</div></div>
      <div style="color:var(--rose-mid);font-size:22px">♡</div>
      <div style="text-align:center;flex:1"><div class="mood-avatar"><span id="moodDog">🐶</span></div><div>小狗</div></div>
    </div>

    <div class="hearts-card">
      <div style="font-size:11px;color:var(--text-muted)">林承承小狗 愛心存摺</div>
      <span class="hearts-val" id="heartVal">—</span>
      <div id="lastLog" style="font-size:11px;color:var(--text-muted)">與雲端同步中...</div>
    </div>

    <div id="page-home" class="page active">
      <div id="dogSection" style="display:none">
        <div class="section-title">快捷申報</div>
        <div class="quick-grid" id="quickGrid"></div>
        <div class="section-title">直接申請任務</div>
        <div class="card">
          <input type="text" id="dName" placeholder="任務名稱">
          <input type="number" id="dPts" placeholder="點數" style="margin-top:8px">
          <button class="btn btn-rose" style="margin-top:12px" onclick="directApply()">遞交奏折 ✉</button>
        </div>
      </div>

      <div id="kingSection" style="display:none">
        <div class="section-title">頒布新諭旨</div>
        <div class="card">
          <input type="text" id="eName" placeholder="任務名稱">
          <input type="number" id="ePts" placeholder="獎勵點數" style="margin-top:8px">
          <button class="btn btn-gold" style="margin-top:12px" onclick="postEdict()">頒布諭旨 📜</button>
        </div>
        <div class="section-title">調整愛心</div>
        <div class="card">
          <input type="number" id="adjPts" placeholder="點數(+/-)">
          <input type="text" id="adjNote" placeholder="原因" style="margin-top:8px">
          <button class="btn btn-rose" style="margin-top:12px" onclick="adjustHearts()">執行調整 ⚖</button>
        </div>
      </div>

      <div class="section-title">📜 帝國諭旨清單</div>
      <div id="edictList"></div>
    </div>

    <div id="page-audit" class="page">
      <div class="section-title">⚖ 待審奏折</div>
      <div id="auditList"></div>
    </div>

    <div id="page-log" class="page">
      <div class="card">
        <div style="font-size:13px;margin-bottom:8px">更新今日心情</div>
        <div style="display:flex;justify-content:center"><span class="mood-opt" onclick="updateMood('😊')">😊</span><span class="mood-opt" onclick="updateMood('🥰')">🥰</span><span class="mood-opt" onclick="updateMood('😴')">😴</span><span class="mood-opt" onclick="updateMood('😡')">😡</span></div>
      </div>
      <div class="section-title">💰 存摺流水帳</div>
      <div id="logList"></div>
    </div>

    <nav class="nav">
      <div class="nav-item active" id="nav-home" onclick="switchTab('home')">🏠帝國</div>
      <div class="nav-item" id="nav-audit" style="display:none" onclick="switchTab('audit')">📋審核</div>
      <div class="nav-item" id="nav-log" onclick="switchTab('log')">📜紀錄</div>
      <div class="nav-item" onclick="location.reload()">↩退出</div>
    </nav>
  </div>
</div>

<script>
// 修正後的 Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyBgjXaz5zubI3iGUsuQNLrhs-rpuzDSc8E",
  authDomain: "ovo-8c829.firebaseapp.com",
  databaseURL: "https://ovo-8c829-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ovo-8c829",
  storageBucket: "ovo-8c829.firebasestorage.app",
  messagingSenderId: "1011404122737",
  appId: "1:1011404122737:web:c66ed56f7df63d1f4989d0"
};

const PASSWORDS = { king: '115king', dog: '520115' };
const START_DATE = new Date('2024-08-10');

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = (path) => db.ref('empire115/' + path);

let role = null;

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function doLogin() {
  const r = document.getElementById('roleSelect').value;
  const p = document.getElementById('pwdInput').value;
  if (p !== PASSWORDS[r]) { toast('密碼錯誤！'); return; }
  role = r;
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainPage').style.display = 'block';
  document.getElementById('daysPill').textContent = '相愛 ' + Math.floor((Date.now() - START_DATE.getTime()) / 86400000) + ' 天';
  if (role === 'king') { document.getElementById('kingSection').style.display = 'block'; document.getElementById('nav-audit').style.display = 'block'; }
  else { document.getElementById('dogSection').style.display = 'block'; }
  startSync();
}

function startSync() {
  ref('hearts').on('value', snap => { document.getElementById('heartVal').textContent = snap.val() || 0; });
  ref('mood/king').on('value', snap => document.getElementById('moodKing').textContent = snap.val() || '👑');
  ref('mood/dog').on('value', snap => document.getElementById('moodDog').textContent = snap.val() || '🐶');
  
  ref('edicts').on('value', snap => {
    const el = document.getElementById('edictList'); el.innerHTML = '';
    const data = snap.val(); if (!data) return;
    Object.entries(data).forEach(([id, e]) => {
      const div = document.createElement('div'); div.className = 'edict-item';
      div.innerHTML = `<div>${e.name} (+${e.pts})</div>${role==='dog'?`<button class="btn btn-rose btn-sm" onclick="submitTask('${e.name}', ${e.pts})">申報</button>`:''}`;
      el.appendChild(div);
    });
  });

  ref('tasks').on('value', snap => {
    const el = document.getElementById('auditList'); el.innerHTML = '';
    const data = snap.val(); if (!data) return;
    Object.entries(data).forEach(([id, t]) => {
      const div = document.createElement('div'); div.className = 'audit-item';
      div.innerHTML = `<div>${t.name} (${t.pts}點)</div>${role==='king'?`<button onclick="audit('${id}', true)">✓</button><button onclick="audit('${id}', false)">✕</button>`:''}`;
      el.appendChild(div);
    });
  });
}

function submitTask(name, pts) { ref('tasks').push({ name, pts }); toast('奏折已遞交'); }
function postEdict() { const n = document.getElementById('eName').value; const p = parseInt(document.getElementById('ePts').value); ref('edicts').push({ name: n, pts: p }); toast('諭旨頒布'); }
function audit(id, pass) {
  if (pass) {
    ref('tasks/'+id).once('value', snap => {
      const t = snap.val();
      ref('hearts').transaction(c => (c||0) + t.pts);
      ref('logs').push({ reason: t.name, val: t.pts, time: Date.now() });
    });
  }
  ref('tasks/'+id).remove();
}

function updateMood(emoji) { ref('mood/' + (role==='king'?'king':'dog')).set(emoji); toast('心情更新'); }
function switchTab(t) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-'+t).classList.add('active'); }
window.addEventListener('load', () => { setTimeout(() => document.getElementById('loadScreen').style.display='none', 1000); });
</script>
</body>
</html>
